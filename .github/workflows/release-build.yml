# Produces per-OS installable artifacts. Attach outputs from dist/ to a GitHub Release, or use a release-publishing action.
# Requires: run vendor-sprites (needs network for first-time clone) before packaging.

name: Build desktop packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-22.04
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Linux packaging deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Vendor sprite assets
        shell: bash
        run: bash scripts/vendor-pokemon-media.sh

      - name: Package (${{ matrix.os }})
        run: npm run ${{ matrix.script }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          if-no-files-found: error
